name: Link Check

on:
  push:
    branches: [main]
    paths: [README.md]
  pull_request:
    paths: [README.md]
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Check links in README.md
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,206,403,429
            --format json
            README.md
          output: /tmp/lychee.json
          fail: false

      - name: Report broken links with line numbers
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys

          try:
              with open('/tmp/lychee.json') as f:
                  data = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f"Could not read lychee output: {e}")
              sys.exit(1)

          fail_map = data.get('fail_map', {})
          if not fail_map:
              print("All links are valid!")
              sys.exit(0)

          with open('README.md') as f:
              lines = f.readlines()

          md_lines = ["# Link Checker Report\n\n", "The following links are broken:\n\n"]

          for _, link_list in fail_map.items():
              for link_info in link_list:
                  url = link_info.get('url', '')
                  status = link_info.get('status', '')
                  pattern = re.compile(re.escape(url) + r'(?![A-Za-z0-9\-._~:/?#@!$&=%;,+])')
                  line_nums = [i + 1 for i, line in enumerate(lines) if pattern.search(line)]
                  loc = ', '.join(f'line {n}' for n in line_nums) if line_nums else 'line unknown'
                  print(f"[{loc}] {url} ({status})")
                  md_lines.append(f"- [{loc}] {url} ({status})\n")

          os.makedirs('lychee', exist_ok=True)
          with open('lychee/out.md', 'w') as f:
              f.writelines(md_lines)

          sys.exit(1)
          PYEOF

      - name: Create Issue From File
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
